# TDNS MP Auditor Configuration
#
# The mpauditor binary provides a read-only multi-provider observer.
# It participates in the HSYNC3 protocol — receiving BEATs, HELLOs,
# PINGs, and SYNC/UPDATE/RFI messages, and joining gossip — but
# never contributes zone data.
#
# This config is similar to tdns-mpagent.yaml, with role: auditor
# in place of role: agent. The auditor does not communicate with a
# combiner or signer as infra peers (it has no zone data to
# contribute), so those sections are absent.

include:
   - mpauditor-zones.yaml

multi-provider:
   role:           auditor
   identity:       audit.provider.example.
   # Active transport mechanisms: "api" and/or "dns"
   supported_mechanisms: [ dns ]
   # Secure CHUNK comms with peers (optional)
   long_term_jose_priv_key: /etc/tdns/keys/auditor.jose.priv.json
   # Authorized peer agents (also discovered via DNS HSYNC3)
   # authorized_peers:
   #    - agent.provider1.example.
   #    - agent.provider2.example.
   local:
      notify:        []
   remote:
      LocateInterval: 60
   xfr:
      outgoing:
         addresses:  []
         auth:       []
      incoming:
         addresses:  []
         auth:       []
   api:
      addresses:
         publish:    [ 10.1.0.1 ]
         listen:     [ 127.0.0.1:8999 ]
      baseurl:       https://api.{TARGET}:{PORT}/api/v1
      port:          8999
      certfile:      /etc/tdns/certs/auditor.crt
      keyfile:       /etc/tdns/certs/auditor.key
   dns:
      addresses:
         publish:    [ 10.1.0.1 ]
         listen:     [ 127.0.0.1:8998 ]
      baseurl:       dns://dns.{TARGET}:{PORT}/
      port:          8998
      # chunk_mode:           edns0
      # chunk_mode:           query
      # chunk_query_endpoint: include
   syncengine:
      intervals:
         beatinterval:       30
         helloretry:         15
         discoveryretry:     15
         hello_fast_attempts: 3
         hello_fast_interval: 2

service:
   name:           TDNS-MPAUDITOR
   verbose:        true
   debug:          false
   refresh:        true
   maxrefresh:     1800

dnsengine:
   addresses:      [ 127.0.0.1:5357 ]

apiserver:
   addresses:      [ 127.0.0.1:8987 ]
   apikey:         change-me-to-something-secret

validator:
   active:         true
   verbose:        false
   debug:          false
   dnskey:
      trusted:
         file:     /etc/tdns/trust-anchors.yaml
   sig0:
      trusted:
         file:     /etc/tdns/sig0-keys.yaml

resolver:
   address:        8.8.8.8:53

db:
   file:  /var/lib/tdns/tdns-mpauditor.db

imrengine:
   active:         true
   root-hints:     /etc/tdns/root.hints
   addresses:      [ 127.0.0.1:5453 ]
   transports:     [ do53 ]
   require_dnssec_validation: true

log:
   file:   /var/log/tdns/tdns-mpauditor.log
   level:  info
   # subsystems:
   #    transport:  debug
   #    auditor:    info

common:
   command:  /usr/local/libexec/tdns-mpauditor

audit:
   event_log:
      retention:        168h   # how long events are kept (default: 1 week)
      prune_interval:   1h     # how often the pruner runs (default: 1h)
