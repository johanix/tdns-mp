# TDNS MP CLI Configuration
#
# The mpcli binary is the management CLI for all tdns-mp
# applications (mpsigner, mpcombiner, and agents managed
# via the agent sub-commands).
#
# Each API server entry maps to a daemon. The "name" field
# must match the internal lookup key for each role:
#   mpcli signer ping    → tdns-mpsigner
#   mpcli combiner ping  → tdns-combiner
#   mpcli agent ping     → tdns-agent

apiservers:
   # The signer (target for "signer" sub-commands)
   - name:         tdns-mpsigner
     baseurl:      https://127.0.0.1:8088/api/v1
     apikey:       change-me-to-something-secret
     authmethod:   X-API-Key

   # The combiner (target for "combiner" sub-commands)
   - name:         tdns-combiner
     baseurl:      https://127.0.0.1:8075/api/v1
     apikey:       change-me-to-something-secret
     authmethod:   X-API-Key

   # The agent (target for "agent" sub-commands)
   - name:         tdns-agent
     baseurl:      https://127.0.0.1:8087/api/v1
     apikey:       change-me-to-something-secret
     authmethod:   X-API-Key

   # The auditor (target for "auditor" sub-commands)
   - name:         tdns-mpauditor
     baseurl:      https://127.0.0.1:8989/api/v1
     apikey:       change-me-to-something-secret
     authmethod:   X-API-Key

log:
   file:   /var/log/tdns/tdns-mpcli.log
   level:  info
